<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Dashboard</h2>
        <p>Bem-vindo, <span id="username"></span>!</p>
    
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Nivel</h5>
                    <p>2</p>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>XP</h5>
                    <p>1500</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Streak</h5>
                    <p>3 dias</p>
                </div>
            </div>
        </div>

        <a href="activities.html" class="btn btn-primary my-3">Atividades</a>
        <a href="progress.html" class="btn btn-info mt-3">Progresso</a>
        <a href="profile.html" class="btn btn-secondary mt-3">Perfil</a>
        <button onclick="logout()" class="btn btn-danger mt-3">Logout</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
